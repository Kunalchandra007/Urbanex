name: urbanex
version: "1.0.0"
description: >
  URBANEX (Urban + Exploration) — a city navigation RL environment where an AI agent
  acts as a smart routing assistant for Bangalore. Named for the dual meaning: exploring
  an urban road network AND the core RL explore-vs-exploit dilemma every agent must solve.
  The agent selects routes, avoids incidents, responds to dynamic traffic and weather,
  and optimizes for safety, time, and fuel.

# OpenEnv Manifest (required for deployment)
spec_version: 1
default_image: urbanex:latest

client:
  class_name: UrbanexEnv
  module: urbanex.client

action:
  class_name: Action
  module: urbanex.models

observation:
  class_name: Observation
  module: urbanex.models

# Documentation fields (optional, for reference)
domain: urban-mobility
tasks:
  - id: easy
    name: reach_destination
    difficulty: easy
    max_steps: 10
    description: Reach destination with no constraints in a clear city
  - id: medium
    name: avoid_and_optimize
    difficulty: medium
    max_steps: 15
    description: Reach destination while avoiding pre-placed incidents
  - id: hard
    name: dynamic_rerouting
    difficulty: hard
    max_steps: 18
    description: Navigate a changing city with dynamic incidents and traffic
action_space:
  type: discrete-structured
  actions:
    - select_route
    - reroute
    - report_incident
    - continue
    - stop
observation_space:
  type: structured
  fields:
    - name: step
      type: integer
      description: Current step number
    - name: current_location
      type: array
      items:
        type: number
      description: Current location as [lat, lng]
    - name: destination
      type: array
      items:
        type: number
      description: Destination as [lat, lng]
    - name: available_routes
      type: array
      items:
        type: object
        properties:
          route_id:
            type: string
          estimated_time_min:
            type: number
          incident_count:
            type: integer
          fuel_cost_score:
            type: number
          safety_score:
            type: number
          hidden_risk_prob:
            type: number
      description: List of available route options
    - name: active_incidents
      type: array
      items:
        type: object
        properties:
          incident_id:
            type: string
          type:
            type: string
          severity:
            type: string
          lat:
            type: number
          lng:
            type: number
          affects_routes:
            type: array
            items:
              type: string
      description: List of active incidents
    - name: traffic_level
      type: string
      enum: [low, medium, high]
      description: Current traffic level
    - name: weather
      type: string
      enum: [clear, rain, fog, heavy_rain]
      description: Current weather condition
    - name: current_route
      type: string
      nullable: true
      description: Currently selected route_id or null
    - name: distance_remaining_km
      type: number
      description: Distance remaining to destination in km
    - name: episode_done
      type: boolean
      description: Whether episode is finished
    - name: situation_summary
      type: string
      description: Plain-English summary of the current navigation situation
reward_range: [-1.0, 1.0]
endpoints:
  health: GET /health
  root: GET /
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: POST /baseline
